services:
  - type: web
    name: talentscout-ai-interviewer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
