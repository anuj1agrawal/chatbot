services:
  - type: web
    name: talentscout-ai-interviewer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: talentscout-db
          property: connectionString
      - key: ENVIRONMENT
        value: production

databases:
  - name: talentscout-db
    databaseName: talentscout
    user: talentscout
    plan: free
